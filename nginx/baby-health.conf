# Baby Health 项目 Nginx 配置
# 部署服务器: 47.121.31.99
# 后端根目录: /www/wwwroot/baby

upstream backend {
    server 127.0.0.1:3321;
}

# HTTP 重定向到 HTTPS (可选，如果有SSL证书)
# server {
#     listen 80;
#     server_name 47.121.31.99;
#     return 301 https://$server_name$request_uri;
# }

# 主服务器配置
server {
    listen 80;
    server_name 47.121.31.99;

    # 前端静态资源（由Nginx直接提供，不经过Node服务）
    location / {
        root /www/wwwroot/baby/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 大文件上传支持
        client_max_body_size 20M;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 上传文件代理
    location /uploads/ {
        alias /www/wwwroot/baby/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}

