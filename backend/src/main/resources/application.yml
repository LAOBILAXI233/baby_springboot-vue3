server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/baby_health?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 15000
      connection-test-query: SELECT 1
      validation-timeout: 3000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  upload:
    dir: ./uploads
  ai:
    api-url: https://api.siliconflow.cn/v1/chat/completions
    api-key: 换成你自己的apikey

logging:
  level:
    com.babyhealth.ai: DEBUG
